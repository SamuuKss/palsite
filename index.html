<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QLV Serv — Dashboard</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2064%2064%22%3E%3Ccircle%20cx%3D%2232%22%20cy%3D%2232%22%20r%3D%2230%22%20fill%3D%22%23101c33%22/%3E%3Cpath%20d%3D%22M4.3%2028%20A28%2028%200%200%201%2059.7%2028%20Q32%2034%204.3%2028%20Z%22%20fill%3D%22%233d7dd8%22/%3E%3Cpath%20d%3D%22M4.3%2036%20A28%2028%200%200%200%2059.7%2036%20Q32%2030%204.3%2036%20Z%22%20fill%3D%22%23182a4a%22/%3E%3Cpath%20d%3D%22M4.15%2028.5%20Q32%2035%2059.85%2028.5%20L59.85%2035.5%20Q32%2042%204.15%2035.5%20Z%22%20fill%3D%22%23f2f7ff%22/%3E%3Ccircle%20cx%3D%2232%22%20cy%3D%2232%22%20r%3D%229.5%22%20fill%3D%22%23f2f7ff%22%20stroke%3D%22%23101c33%22%20stroke-width%3D%223%22/%3E%3Ccircle%20cx%3D%2232%22%20cy%3D%2232%22%20r%3D%2230%22%20fill%3D%22none%22%20stroke%3D%22%23fff%22%20stroke-width%3D%223%22/%3E%3C/svg%3E">
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><circle cx="16" cy="16" r="15" fill="%233d7dd8"/><path d="M1 16h30a15 15 0 0 1-30 0z" fill="%231e3a6e"/><rect x="1" y="14" width="30" height="4" fill="%23fff"/><circle cx="16" cy="16" r="4" fill="%23fff" stroke="%231e3a6e" stroke-width="1.5"/></svg>'>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1526; --panel:#141f36; --soft:#1a2845; --line:#24365c;
  --ink:#e8eefc; --mute:#8fa3c8; --sky:#4fc3f7; --sphere:#3d7dd8;
  --amber:#ffc94d; --grass:#7ed491; --danger:#ff7a6b;
  --yellow:#ffd83d; --outline:#1d4f8c; --skytop:#6cc6ff; --skybot:#2f6cc2;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:'Nunito',sans-serif;min-height:100vh}
.wrap{max-width:1100px;margin:0 auto;padding:0 20px}
header{background:linear-gradient(180deg,var(--skytop) 0%,var(--skybot) 100%);position:relative;padding:30px 0 24px;overflow:hidden}
header:after{content:"";position:absolute;left:0;right:0;bottom:0;height:4px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.55) 50%,transparent)}
header:before{content:"";position:absolute;inset:0;background:
  radial-gradient(ellipse 220px 70px at 12% 18%,rgba(255,255,255,.5),transparent 70%),
  radial-gradient(ellipse 300px 90px at 78% 30%,rgba(255,255,255,.35),transparent 70%),
  radial-gradient(ellipse 180px 60px at 45% 8%,rgba(255,255,255,.3),transparent 70%);
  pointer-events:none}
#headpals{position:absolute;inset:0;pointer-events:none}
#headpals img{position:absolute;width:52px;height:52px;border-radius:50%;border:3px solid rgba(255,255,255,.8);background:rgba(255,255,255,.3);opacity:.85;box-shadow:0 4px 12px rgba(0,0,0,.25)}
.eyebrow{color:#fff;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.14em;margin-bottom:5px;text-shadow:0 1px 3px rgba(0,0,0,.35);display:flex;align-items:center;gap:7px}
.sphere-ico{display:inline-block;width:15px;height:15px;border-radius:50%;background:linear-gradient(180deg,var(--sphere) 44%,#fff 44%,#fff 56%,#1e3a6e 56%);border:1.5px solid #fff;flex-shrink:0}
h1{font-family:'Baloo 2',sans-serif;font-size:38px;font-weight:800;line-height:1;color:var(--yellow);letter-spacing:.5px;
  text-shadow:2px 2px 0 var(--outline),-2px 2px 0 var(--outline),2px -2px 0 var(--outline),-2px -2px 0 var(--outline),0 2px 0 var(--outline),0 -2px 0 var(--outline),2px 0 0 var(--outline),-2px 0 0 var(--outline),4px 5px 0 rgba(0,0,0,.25)}
.badge{background:rgba(13,21,38,.75);color:var(--grass);border:2px solid rgba(255,255,255,.35);padding:6px 16px;border-radius:99px;font-size:13px;font-weight:900;position:relative;z-index:2;box-shadow:0 3px 8px rgba(0,0,0,.3)}
.headrow{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:16px}
.logo{display:flex;align-items:center;gap:14px}
.logo svg{width:56px;height:56px;flex-shrink:0;filter:drop-shadow(0 4px 8px rgba(0,0,0,.35))}
@media (max-width:520px){.logo svg{width:42px;height:42px}.logo{gap:10px}}
nav{display:flex;gap:8px;margin-top:22px;flex-wrap:wrap;position:relative;z-index:2}
nav button{background:rgba(13,21,38,.78);color:#cfe3f7;border:2px solid rgba(255,255,255,.25);border-radius:8px;padding:9px 20px;font:800 14px 'Nunito';cursor:pointer;transform:skew(-10deg);transition:all .15s;box-shadow:0 3px 0 rgba(0,0,0,.3)}
nav button span{display:inline-block;transform:skew(10deg)}
nav button:hover{color:#fff;border-color:#fff;transform:skew(-10deg) translateY(-1px)}
nav button:focus,nav button:focus-visible{outline:none}
nav button.on{background:linear-gradient(135deg,#fff 0%,#dff2ff 100%);color:#12223f;border-color:#fff;box-shadow:0 3px 0 rgba(0,0,0,.35),0 5px 12px rgba(0,0,0,.25)}
main{padding:24px 0 40px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-top:20px}
.pill{background:var(--soft);border:1px solid var(--line);border-radius:14px;padding:12px 16px}
.pill .l{color:var(--mute);font-size:11px;text-transform:uppercase;letter-spacing:.08em}
.pill .v{font-size:20px;font-weight:700;margin-top:2px}
.bar{background:var(--soft);border-radius:99px;height:12px;margin-top:14px;overflow:hidden}
.bar>div{height:100%;background:linear-gradient(90deg,var(--sphere),var(--sky));border-radius:99px;transition:width .6s;position:relative}
.bar>div:after{content:"";position:absolute;right:-8px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;background:linear-gradient(180deg,var(--sphere) 44%,#fff 44%,#fff 56%,#1e3a6e 56%);border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.4)}
.grid2{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(330px,1fr))}
.grid3{display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(250px,1fr))}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 3px 0 rgba(0,0,0,.25);position:relative}
.h2{font-family:'Baloo 2';font-size:20px;font-weight:800;margin:26px 0 14px;display:flex;align-items:center;gap:10px}
.h2:before{content:"";width:8px;height:22px;background:linear-gradient(180deg,var(--sky),var(--sphere));border-radius:3px;transform:skew(-10deg)}
.h2:first-child{margin-top:0}
/* Records */
.record{display:flex;align-items:center;gap:12px}
.record .ic{font-size:28px;flex-shrink:0}
.record .mid{min-width:0;flex:1}
.record .t{font-size:11px;color:var(--mute);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.record .who{font-weight:800;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.record .valbox{flex-shrink:0;text-align:right}
.record .val{font-weight:900;font-size:22px;line-height:1;color:var(--amber)}
.record .unit{font-size:10px;color:var(--mute);text-transform:uppercase;letter-spacing:.04em}
/* Cartes joueurs */
.pcard{cursor:pointer;transition:border-color .15s,transform .15s}
.pcard:hover{border-color:var(--sphere);transform:translateY(-2px)}
.pcard-top{display:flex;align-items:center;gap:12px}
.avatar{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#fff;flex-shrink:0}
.avatar.big{width:72px;height:72px;font-size:28px}
.pname{font-weight:800;font-size:16px}
.psub{font-size:12px;color:var(--mute)}
.plvl{margin-left:auto;text-align:right}
.plvl b{display:inline-block;background:linear-gradient(135deg,var(--sky),#7dd6ff);color:#0d2038;font-size:20px;font-weight:900;padding:3px 12px;border-radius:8px;transform:skew(-8deg);box-shadow:0 2px 0 #1e5a8a}
.plvl span{display:block;color:var(--mute);font-size:11px;margin-top:-3px}
.mini{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center;margin:14px 0 4px}
.mini>div{background:var(--soft);border-radius:10px;padding:8px 4px}
.mini b{font-size:16px;display:block}
.mini span{font-size:10px;color:var(--mute)}
.teamicons{display:flex;gap:6px;margin-top:12px}
.teamicons img{width:38px;height:38px;border-radius:50%;background:var(--soft);border:2px solid var(--line);object-fit:cover}
.teamicons img.lucky{border-color:var(--amber)}
/* Profil joueur */
.backbtn{background:var(--soft);color:var(--sky);border:1px solid var(--line);border-radius:99px;padding:7px 16px;font:700 13px 'Nunito';cursor:pointer;margin-bottom:16px}
.profhead{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.profhead .pname{font-family:'Baloo 2';font-size:26px}
.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:18px 0}
.pal{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:14px;padding:8px 12px;margin-bottom:7px;cursor:pointer;transition:background .15s}
.pal:hover{background:var(--soft)}
.pal.lucky{border-color:rgba(255,201,77,.45)}
.picon{width:42px;height:42px;border-radius:50%;background:var(--soft);border:2px solid var(--line);object-fit:cover;flex-shrink:0}
.pal.lucky .picon{border-color:var(--amber)}
.pinfo{flex:1;min-width:0}
.pinfo .nm{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pinfo .meta{font-size:11px;color:var(--mute)}
.pright{text-align:right;flex-shrink:0}
.pright .lv{display:inline-block;font-weight:900;background:linear-gradient(135deg,var(--sky),#7dd6ff);color:#0d2038;font-size:12px;padding:2px 9px;border-radius:6px;transform:skew(-8deg);box-shadow:0 1.5px 0 #1e5a8a}
.pright .cd{font-size:11px;color:var(--mute)}
.sec{color:var(--mute);font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin:4px 0 8px}
.searchbar{background:var(--soft);border:1px solid var(--line);border-radius:12px;color:var(--ink);padding:10px 16px;font:600 14px 'Nunito';width:100%;margin-bottom:16px}
/* Guildes */
.memberchip{display:inline-block;background:var(--soft);border:1px solid var(--line);border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;margin:3px 4px 0 0}
/* Podium classements */
.podium{display:flex;align-items:flex-end;gap:8px;justify-content:center;margin:10px 0 16px}
.pod{text-align:center;flex:1}
.pod .medal{font-size:22px}
.pod .n{font-weight:800;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pod .v{font-weight:900;font-size:15px}
.pod .col{border-radius:10px 10px 0 0;margin-top:6px}
.lb-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px}
.lb-row .rk{width:16px;text-align:center;font-weight:900;color:var(--mute)}
.lb-row .val{margin-left:auto;font-weight:800}
/* Modal */
#modal{position:fixed;inset:0;background:rgba(5,9,18,.75);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
#modal.open{display:flex}
.mbox{background:var(--panel);border:1px solid var(--line);border-radius:20px;max-width:440px;width:100%;padding:24px;position:relative;max-height:90vh;overflow-y:auto}
.mclose{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--mute);font-size:22px;cursor:pointer;font-family:'Nunito'}
.mhead{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.mhead img{width:72px;height:72px;border-radius:50%;background:var(--soft);border:3px solid var(--line);object-fit:cover}
.mhead.lucky img{border-color:var(--amber)}
.mtitle{font-family:'Baloo 2';font-size:22px;font-weight:800;line-height:1.1}
.msub{color:var(--mute);font-size:12px}
.mbadges{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.mb{font-size:11px;font-weight:800;padding:2px 10px;border-radius:99px}
.mb.lucky{background:rgba(255,201,77,.15);color:var(--amber);border:1px solid rgba(255,201,77,.3)}
.mb.alpha{background:rgba(255,122,107,.15);color:var(--danger);border:1px solid rgba(255,122,107,.3)}
.mb.lv{background:rgba(79,195,247,.12);color:var(--sky);border:1px solid rgba(79,195,247,.25)}
.mb.g{background:rgba(126,212,145,.12);color:var(--grass);border:1px solid rgba(126,212,145,.25)}
.ivrow{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px}
.ivrow .ivl{width:60px;color:var(--mute)}
.ivrow .track{flex:1;height:8px;background:var(--soft);border-radius:99px;overflow:hidden}
.ivrow .track>div{height:100%;border-radius:99px}
.ivrow .ivv{width:34px;text-align:right;font-weight:800}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.tag{font-size:11px;padding:3px 10px;border-radius:99px;background:rgba(79,195,247,.1);color:var(--sky);border:1px solid rgba(79,195,247,.2)}
.tag.gold{background:rgba(255,201,77,.14);color:var(--amber);border-color:rgba(255,201,77,.27)}
.maplayout{display:flex;gap:14px}
.mapside{width:230px;flex-shrink:0;display:flex;flex-direction:column;gap:10px}
.mapside input[type=text]{background:var(--soft);border:1px solid var(--line);border-radius:10px;color:var(--ink);padding:8px 12px;font:600 13px 'Nunito';width:100%}
.cat{display:flex;align-items:center;gap:8px;background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:7px 10px;font-size:13px;font-weight:700;cursor:pointer}
.cat input{accent-color:var(--sphere)}
.cat .cnt{margin-left:auto;color:var(--mute);font-weight:800;font-size:12px}
.sideitems{overflow-y:auto;max-height:430px;display:flex;flex-direction:column;gap:4px}
.sideitem{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:9px;font-size:13px;cursor:pointer;border:1px solid transparent}
.sideitem:hover{background:var(--soft);border-color:var(--line)}
.sideitem .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sideitem .sub{color:var(--mute);font-size:11px;margin-left:auto}
#coordbar{position:absolute;left:10px;bottom:10px;z-index:800;background:rgba(13,21,38,.9);border:1px solid var(--line);border-radius:9px;padding:5px 12px;font:700 12px 'Nunito';color:var(--sky);pointer-events:none}
@media (max-width:760px){.maplayout{flex-direction:column}.mapside{width:100%}.sideitems{max-height:150px}}

#leafmap{height:640px;border-radius:14px;border:1px solid var(--line);background:#0a1a2e}
.leaflet-popup-content-wrapper,.leaflet-popup-tip{background:rgba(13,21,38,.95);color:var(--ink);border:1px solid var(--line)}
.leaflet-popup-content{font:600 13px 'Nunito';margin:10px 14px}
.baselabel{background:rgba(13,21,38,.85);color:#e8eefc;border:1px solid #24365c;border-radius:8px;font:700 11px 'Nunito';padding:2px 8px}
.baselabel:before{display:none}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--mute);margin-bottom:12px}
footer{color:var(--mute);border-top:1px solid var(--line);text-align:center;font-size:12px;padding:20px 0;margin-top:20px}
.err{background:rgba(255,122,107,.1);border:1px solid rgba(255,122,107,.3);color:var(--danger);border-radius:14px;padding:16px 20px;font-size:14px}
@media (max-width:520px){h1{font-size:26px}.mini{grid-template-columns:repeat(2,1fr)}}

/* ===== Activité ===== */
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px;vertical-align:1px}
.dot.on{background:var(--grass);box-shadow:0 0 6px var(--grass)}
.dot.off{background:#3a4a6b}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}
.chip{background:var(--soft);border:1px solid var(--line);border-radius:99px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;color:var(--mute)}
.chip.on{color:#0d1526;background:var(--sky);border-color:var(--sky)}
.dayhdr{font-weight:900;color:var(--mute);text-transform:uppercase;font-size:12px;letter-spacing:.08em;margin:18px 0 8px}
.evt{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin-bottom:8px}
.evt .eic{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.evt .etxt{flex:1;font-size:14px}
.evt .etime{color:var(--mute);font-size:12px;white-space:nowrap}
.evt.gold{border-color:var(--amber);background:linear-gradient(90deg,rgba(255,201,77,.10),var(--panel))}
.evt .ename{font-weight:900}
.evt .esp{display:inline-flex;gap:3px;vertical-align:middle;margin-left:6px}
.evt .esp img{width:22px;height:22px;border-radius:50%;background:var(--soft)}
.chartcard svg{width:100%;height:auto;display:block}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;font-size:12px;color:var(--mute)}
.legend b{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:-1px}
</style>
</head>
<body>
<header><div id="headpals"></div><div class="wrap">
  <div class="headrow">
    <div class="logo">
      <svg viewBox="0 0 64 64" aria-hidden="true">

          <linearGradient id="lgTop" x1="0" y1="0" x2="0" y2="1">

      </svg>
      <h1>QLV Serv</h1>
    </div>
    <span class="badge" id="badge">● chargement…</span>
  </div>
  <nav id="tabs">
    <button data-t="accueil" class="on"><span>Accueil</span></button>

    <button data-t="guildes"><span>Guildes</span></button>

<script>
const PALDEX_TOTAL = 287;
// ===== Traductions (complète librement ces tables) =====
const PAL_FR = {
  "Alpaca":"Melpaca",  "AmaterasuWolf":"Kitsun",  "AmaterasuWolf_Dark":"Kitsun Noct",
  "AmaterasuWolf_Dark_Quest_Enemy":"Kitsun Noct",  "AmaterasuWolf_Dark_Quest_Friend":"Kitsun Noct",  "Anubis":"Anubis",
  "ArmorWoodlouse":"Armor Woodlouse",  "BadCatGirl":"Nyafia",  "BadCatgirl":"Nyafia",
  "Baphomet":"Incineram",  "Baphomet_Dark":"Incineram Noct",  "Baphomet_Dark_Oilrig":"Incineram Noct",

async function load(){
  try{
    const r = await fetch("server_data.json?t="+Date.now());
    if(!r.ok) throw new Error("HTTP "+r.status);
    DATA = await r.json();
    try{ ACTIVITY = await (await fetch("activity.json?t="+Date.now())).json(); }catch(_){ ACTIVITY=null; }
    try{ HISTORY  = await (await fetch("history.json?t="+Date.now())).json(); }catch(_){ HISTORY=null; }
    document.getElementById("badge").textContent = "● "+(DATA.totals?.players??"?")+" joueurs";
    afterLoad();
    const gen = DATA.generated_at ? new Date(DATA.generated_at) : null;
    if(gen) document.getElementById("footer").textContent =
      "Dernière mise à jour : "+gen.toLocaleString("fr-FR",{dateStyle:"long",timeStyle:"short"});
    render();
  }catch(e){
    // Aperçu / démo : données d'exemple intégrées
    DATA = DEMO_DATA;
    document.getElementById("badge").textContent = "● "+DATA.totals.players+" joueurs (démo)";
    document.getElementById("footer").textContent = "Mode démonstration — données d'exemple";
    render(); afterLoad();
  }
}
function afterLoad(){
  const seen=new Set(), picks=[];
  for(const p of (DATA.players||[])) for(const pal of (p.pals||[]))
    if(!seen.has(pal.species)&&picks.length<6){seen.add(pal.species);picks.push(pal.species);}
  const spots=[[82,12,-8],[89,55,6],[74,78,-4],[8,68,5],[16,86,-6],[86,32,8]];
  document.getElementById("headpals").innerHTML = picks.map((sp,i)=>{
    const [top,left,rot]=spots[i]||[70,50,0];
    return '<img src="'+palIcon(sp)+'" style="top:'+top+'%;left:'+left+'%;transform:rotate('+rot+'deg)" onerror="this.remove()">';
  }).join("");
}
document.getElementById("tabs").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b) return;
  TAB=b.dataset.t; PROFILE=null;
  document.querySelectorAll("nav button").forEach(x=>x.classList.toggle("on",x===b));
  render();
});
function render(){
  if(!DATA) return;
  const m=document.getElementById("main");
  if(TAB==="accueil") m.innerHTML=accueil();
  else if(TAB==="activite") m.innerHTML=activite();
  else if(TAB==="joueurs") m.innerHTML=(PROFILE!=null?profil(PROFILE):joueurs());
  else if(TAB==="guildes") m.innerHTML=guildes();
  else if(TAB==="classements") m.innerHTML=classements();
  else m.innerHTML=mapView();
}

const ONLINE_MS = 20*60*1000; // en ligne si bougé depuis < 20 min
function lastSeenOf(p){ return p.last_seen ? new Date(p.last_seen).getTime() : null; }
function isOnline(p){ const t=lastSeenOf(p); return t!=null && (Date.now()-t) < ONLINE_MS; }
function agoFR(iso){
  const s=Math.max(0,(Date.now()-new Date(iso).getTime())/1000);
  if(s<90) return "à l'instant";
  if(s<3600) return "il y a "+Math.round(s/60)+" min";
  if(s<86400) return "il y a "+Math.round(s/3600)+" h";
  return "il y a "+Math.round(s/86400)+" j";
}
function presenceDot(p){
  const on=isOnline(p), t=lastSeenOf(p);
  const tip=on?"En ligne":(t?("Vu "+agoFR(p.last_seen)):"Jamais vu en ligne");
  return '<span class="dot '+(on?'on':'off')+'" title="'+tip+'"></span>';
}
function presenceText(p){
  return isOnline(p)?'<span style="color:var(--grass);font-weight:900">🟢 en ligne</span>'
    :(p.last_seen?('vu '+agoFR(p.last_seen)):'hors ligne');
}
function playerColor(name){
  const i=(DATA.players||[]).findIndex(p=>p.name===name);
  return PLAYER_COLORS[(i<0?0:i)%PLAYER_COLORS.length];
}
function evtHTML(e){
  const col=playerColor(e.name||"");
  const who='<span class="ename" style="color:'+col+'">'+esc(e.name||"")+'</span>';
  const spList=Array.isArray(e.species)?e.species:(e.species?[e.species]:[]);
  const spIcons=spList.length?('<span class="esp">'+spList.map(s=>
    '<img src="'+palIcon(s)+'" title="'+esc(palName(s))+'" onerror="this.remove()">').join("")+'</span>'):"";
  let ic="✨", txt="", gold=false;
  switch(e.type){
    case "join":     ic="🎉"; txt=who+" a rejoint le serveur !"; gold=true; break;
    case "level":    ic="⬆️"; txt=who+" passe niveau <b>"+e.to+"</b>"+((e.to-e.frm)>1?" (depuis le "+e.frm+")":""); break;
    case "capture":  ic="🏹"; txt=who+" a capturé <b>"+e.n+"</b> pal"+(e.n>1?"s":"")+spIcons; break;
    case "lucky":    ic="✨"; txt=who+" a trouvé <b>"+e.n+"</b> pal"+(e.n>1?"s":"")+" lucky !"; gold=true; break;
    case "alpha":    ic="👑"; txt=who+" a capturé un alpha : <b>"+esc(palName(e.species))+"</b>"+spIcons; break;
    case "paldeck":  ic="📖"; txt=who+" : +"+e.n+" espèce"+(e.n>1?"s":"")+" au Paldex ("+e.total+"/"+PALDEX_TOTAL+")"; break;
    case "effigy":   ic="🗿"; txt=who+" a trouvé "+e.n+" effigie"+(e.n>1?"s":""); break;
    case "travel":   ic="🧭"; txt=who+" a débloqué "+e.n+" voyage"+(e.n>1?"s":"")+" rapide"+(e.n>1?"s":""); break;
    case "record":   ic="🏆"; txt=who+" prend la tête « "+esc(e.cat)+" » avec <b>"+nf(e.value)+"</b>"+(e.old_name?(" (devant "+esc(e.old_name)+")"):""); gold=true; break;
    case "base_new": ic="🏠"; txt="Nouvelle base construite <b>("+esc(e.guild)+")</b>"; break;
    case "base_gone":ic="💥"; txt="Une base a disparu <b>("+esc(e.guild)+")</b>"; break;
    default: txt=who+" — "+esc(e.type);
  }
  return '<div class="evt'+(gold?' gold':'')+'"><span class="eic">'+ic+'</span>'
    +'<span class="etxt">'+txt+'</span><span class="etime" title="'+new Date(e.t).toLocaleString("fr-FR")+'">'+agoFR(e.t)+'</span></div>';
}
function setActFilter(n){ ACT_FILTER=(ACT_FILTER===n?null:n); render(); }
function dayLabel(iso){
  const d=new Date(iso), today=new Date(); const one=864e5;
  const dd=new Date(d.getFullYear(),d.getMonth(),d.getDate()), tt=new Date(today.getFullYear(),today.getMonth(),today.getDate());
  const diff=Math.round((tt-dd)/one);
  if(diff===0) return "Aujourd'hui"; if(diff===1) return "Hier";
  return d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
}
function lineChart(idx,title,color){
  if(!HISTORY||HISTORY.length<2) return "";
  const byUid={}; (DATA.players||[]).forEach((p,i)=>byUid[p.uid]={name:p.name,col:PLAYER_COLORS[i%PLAYER_COLORS.length],pts:[]});
  let t0=Infinity,t1=-Infinity,vmax=1;
  for(const pt of HISTORY){
    const t=new Date(pt.t).getTime(); if(!isFinite(t)) continue;
    t0=Math.min(t0,t); t1=Math.max(t1,t);
    for(const uid in (pt.p||{})){ if(!byUid[uid]) continue;
      const v=(pt.p[uid]||[])[idx]??0; vmax=Math.max(vmax,v); byUid[uid].pts.push([t,v]); }
  }
  if(t1<=t0) return "";
  const W=600,H=170,P=8;
  const X=t=>P+(t-t0)/(t1-t0)*(W-2*P), Y=v=>H-P-(v/vmax)*(H-2*P);
  let lines="",legend="";
  for(const uid in byUid){ const s=byUid[uid]; if(s.pts.length<2) continue;
    lines+='<polyline fill="none" stroke="'+s.col+'" stroke-width="2.5" stroke-linejoin="round" points="'
      +s.pts.map(([t,v])=>X(t).toFixed(1)+","+Y(v).toFixed(1)).join(" ")+'"/>';
    const last=s.pts[s.pts.length-1];
    lines+='<circle cx="'+X(last[0]).toFixed(1)+'" cy="'+Y(last[1]).toFixed(1)+'" r="3.5" fill="'+s.col+'"/>';
    legend+='<span><b style="background:'+s.col+'"></b>'+esc(s.name)+' ('+nf(last[1])+')</span>';
  }
  if(!lines) return "";
  const days=Math.max(1,Math.round((t1-t0)/864e5));
  return '<div class="card chartcard"><div class="sec" style="margin-top:0">'+title
    +' <span style="color:var(--mute);font-weight:400;font-size:12px">— '+days+' jour'+(days>1?'s':'')+'</span></div>'
    +'<svg viewBox="0 0 '+W+' '+H+'">'
    +'<line x1="'+P+'" y1="'+(H-P)+'" x2="'+(W-P)+'" y2="'+(H-P)+'" stroke="var(--line)"/>'
    +lines+'</svg><div class="legend">'+legend+'</div></div>';
}
function activite(){
  const evts=(ACTIVITY&&ACTIVITY.events)||[];
  const names=[...new Set(evts.map(e=>e.name).filter(Boolean))];
  const chips='<div class="chips"><span class="chip'+(ACT_FILTER===null?' on':'')+'" onclick="setActFilter(null)">Tous</span>'
    +names.map(n=>'<span class="chip'+(ACT_FILTER===n?' on':'')+'" style="'+(ACT_FILTER===n?('background:'+playerColor(n)+';border-color:'+playerColor(n)):'')+'" onclick="setActFilter(\''+esc(n)+'\')">'+esc(n)+'</span>').join("")+'</div>';
  const shown=evts.filter(e=>ACT_FILTER===null||e.name===ACT_FILTER);
  let feed="";
  if(!shown.length){
    feed='<div class="card" style="color:var(--mute)">Rien à signaler pour le moment — le fil se remplit à chaque synchronisation (toutes les 15 minutes) dès qu\'il se passe quelque chose sur le serveur.</div>';
  }else{
    let lastDay=null;
    for(const e of shown){
      const d=dayLabel(e.t);
      if(d!==lastDay){ feed+='<div class="dayhdr">'+d+'</div>'; lastDay=d; }
      feed+=evtHTML(e);
    }
  }
  const online=(DATA.players||[]).filter(isOnline);
  const onlineBar='<div class="stats" style="margin-top:0">'
    +pill("En ligne",online.length?online.map(p=>esc(p.name)).join(", "):"Personne","var(--grass)")
    +pill("Événements",nf(evts.length))+'</div>';
  const charts=lineChart(0,"📈 Progression des niveaux")+lineChart(1,"🏹 Progression des captures");
  return onlineBar
    +(charts?('<div class="h2">📊 Progression</div><div class="grid2">'+charts+'</div>'):'')
    +'<div class="h2">🗞️ Fil d\'activité</div>'+chips+feed;
}

    +'<div><div class="mtitle">'+esc(palName(pal.species))+'</div>'
    +'<div class="msub">'+esc(pal.species)+(capdate?' · capturé le '+capdate:'')+'</div>'
    +'<div class="mbadges"><span class="mb lv">Niveau '+pal.lvl+'</span>'
    +(pal.gender&&GENDER_FR[pal.gender]?'<span class="mb g">'+GENDER_FR[pal.gender]+'</span>':'')
    +(pal.lucky?'<span class="mb lucky">✦ Lucky</span>':'')
    +(pal.alpha?'<span class="mb alpha">ALPHA</span>':'')
    +'<span class="mb lv">Condensé ★'+(pal.condense||0)+'</span></div></div></div>'
    +'<div class="sec">Talents (IV)</div>'
    +iv("Vie",pal.talent_hp||0,"var(--grass)")
    +iv("Attaque",pal.talent_atk||0,"var(--danger)")
    +iv("Défense",pal.talent_def||0,"var(--sky)")
    +'<div class="sec" style="margin-top:14px">Attaques équipées</div><div class="tags">'+waza+'</div>'
    +'<div class="sec" style="margin-top:14px">Passifs</div><div class="tags">'+tags+'</div>'
    +(pal.friendship?'<div class="sec" style="margin-top:14px">Amitié</div><div style="font-weight:800;color:var(--grass)">💚 '+nf(pal.friendship)+' points</div>':'');
  document.getElementById("modal").classList.add("open");
}
function closeModal(){document.getElementById("modal").classList.remove("open");}
document.getElementById("modal").addEventListener("click",e=>{if(e.target.id==="modal")closeModal();});

// ===== GUILDES =====
function guildes(){
  const gs=DATA.guilds||[];
  if(!gs.length) return '<div class="card" style="color:var(--mute)">Aucune guilde détectée.</div>';
  return '<div class="grid2">'+gs.map((g,i)=>{
    const col=PLAYER_COLORS[i%PLAYER_COLORS.length];
    return '<div class="card">'
      +'<div class="pcard-top"><div class="avatar" style="background:linear-gradient(135deg,var(--sphere),'+col+')">⚔️</div>'
      +'<div><div class="pname">'+esc(g.name||"Guilde sans nom")+'</div>'
      +'<div class="psub">'+g.members.length+' membre'+(g.members.length>1?'s':'')+' · '+g.bases+' base'+(g.bases>1?'s':'')+'</div></div></div>'
      +'<div style="margin-top:10px">'+(g.members||[]).map(m=>'<span class="memberchip">'+esc(m)+'</span>').join("")+'</div>'
      +'</div>';
  }).join("")+'</div>';
}

// ===== CLASSEMENTS =====
function classements(){
  const cats=[
    ["⬆️ Niveau","level","var(--grass)"],
    ["🔵 Captures","captures","var(--sky)"],
    ["✦ Lucky","shinies","var(--amber)"],
    ["📖 Paldex","paldeck","var(--grass)"],
    ["🗿 Effigies","effigies","var(--danger)"],
    ["🧭 Voyages rapides","fast_travels","var(--sky)"],
  ];
  return '<div class="grid3">'+cats.map(([title,key,color])=>{
    const rows=[...DATA.players].map(p=>({n:p.name,v:p[key]??0})).sort((a,b)=>b.v-a.v);
    const podium=rows.slice(0,3), rest=rows.slice(3);
    const heights=[46,64,36], order=[1,0,2], medals=["🥈","🥇","🥉"];
    return '<div class="card"><div class="pname" style="margin-bottom:8px">'+title+'</div>'
      +'<div class="podium">'+order.map((oi,k)=>{
          const r=podium[oi]; if(!r) return '<div class="pod"></div>';
          return '<div class="pod"><div class="medal">'+medals[k]+'</div>'
            +'<div class="n">'+esc(r.n)+'</div><div class="v" style="color:'+color+'">'+nf(r.v)+'</div>'
            +'<div class="col" style="height:'+heights[k]+'px;background:'+color+'22;border:1px solid '+color+'44"></div></div>';
        }).join("")+'</div>'
      +rest.map((r,i)=>'<div class="lb-row"><span class="rk">'+(i+4)+'</span>'+esc(r.n)
        +'<span class="val" style="color:'+color+'">'+nf(r.v)+'</span></div>').join("")
      +'</div>';
  }).join("")+'</div>';
}

// ===== CARTE =====
function mapView(){
  setTimeout(initLeaflet,0);
  return '<div class="card">'
    +'<div class="maplayout">'
    +'<div class="mapside">'
      +'<input type="text" id="mapsearch" placeholder="Rechercher joueur, guilde…" oninput="renderSide()">'
      +'<label class="cat"><input type="checkbox" id="lyBases" checked onchange="toggleLayer()"> 🏕 Bases<span class="cnt" id="cntB"></span></label>'
      +'<label class="cat"><input type="checkbox" id="lyPlayers" checked onchange="toggleLayer()"> 👤 Joueurs<span class="cnt" id="cntP"></span></label>'
      +'<div class="sideitems" id="sideitems"></div>'
      +'<button onclick="startCal()" style="background:var(--soft);color:var(--sky);border:1px solid var(--line);border-radius:10px;padding:8px;font:700 12px Nunito;cursor:pointer">🎯 Calibrer la carte</button>'
    +'</div>'
    +'<div style="flex:1;position:relative">'
      +'<div id="calmsg" style="display:none;background:rgba(79,195,247,.1);border:1px solid rgba(79,195,247,.3);color:var(--sky);border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:10px"></div>'
      +'<div id="leafmap" style="height:640px"></div>'
      +'<div id="coordbar">—</div>'
    +'</div>'
    +'</div>'
    +'<p style="color:var(--mute);font-size:12px;margin-top:12px">Fond de carte : capture plein écran de la carte du jeu → <b>map.jpg</b> dans C:\\palsite\\site. Points décalés ? 🎯 Calibrer (2 clics).</p>'
    +'</div>';
}
let LMAP=null, GB=null, GP=null, CAL=null, MARKS={};
const DEFAULT_CAL={X_MIN:-582888,X_MAX:335112,Y_MIN:-301000,Y_MAX:617000};
const getCal=()=>JSON.parse(localStorage.getItem("palcal")||"null")||DEFAULT_CAL;
function worldToLatLng(wx,wy){
  const c=getCal();
  const px=(wy-c.Y_MIN)/(c.Y_MAX-c.Y_MIN)*100;
  const py=(1-(wx-c.X_MIN)/(c.X_MAX-c.X_MIN))*100;
  return [100-py,px];
}
function latLngToWorld(lat,lng){
  const c=getCal();
  const wy=lng/100*(c.Y_MAX-c.Y_MIN)+c.Y_MIN;
  const wx=(1-(100-lat)/100)*(c.X_MAX-c.X_MIN)+c.X_MIN;
  return [wx,wy];
}
function initLeaflet(){
  const el=document.getElementById('leafmap');
  if(!el||typeof L==="undefined") return;
  if(LMAP){LMAP.remove();LMAP=null;}
  MARKS={};
  const bounds=[[0,0],[100,100]];
  LMAP=L.map(el,{crs:L.CRS.Simple,minZoom:2,maxZoom:7,zoomSnap:.5,attributionControl:false});
  LMAP.fitBounds(bounds);
  const img=new Image();
  img.onload=()=>L.imageOverlay('map.jpg',bounds).addTo(LMAP).bringToBack();
  img.onerror=()=>{
    L.rectangle(bounds,{color:'#24365c',weight:1,fillColor:'#0f2036',fillOpacity:1,interactive:false}).addTo(LMAP);
    for(let i=10;i<100;i+=10){
      L.polyline([[i,0],[i,100]],{color:'#1a2845',weight:1,interactive:false}).addTo(LMAP);
      L.polyline([[0,i],[100,i]],{color:'#1a2845',weight:1,interactive:false}).addTo(LMAP);
    }
  };
  img.src='map.jpg';
  GB=L.layerGroup().addTo(LMAP);
  GP=L.layerGroup().addTo(LMAP);
  const bases=(DATA.bases||[]).filter(b=>b.x!=null);
  bases.forEach((b,i)=>{
    const col=PLAYER_COLORS[i%PLAYER_COLORS.length];
    const guild=b.guild||('Base #'+(i+1));
    const mk=L.marker(worldToLatLng(b.x,b.y),{icon:L.divIcon({className:'',iconSize:[28,28],
      html:'<div style="width:28px;height:28px;border-radius:50% 50% 50% 4px;background:'+col+';border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:14px;transform:rotate(-45deg)"><span style="transform:rotate(45deg)">🏕</span></div>'})})
      .addTo(GB)
      .bindPopup('🏕 <b>'+esc(guild)+'</b>'+((b.members||[]).length?'<br><span style="color:#8fa3c8">'+esc(b.members.join(', '))+'</span>':''));
    MARKS['b'+i]=mk;
  });
  const players=(DATA.players||[]).filter(p=>p.x!=null);
  players.forEach((p,i)=>{
    const col=PLAYER_COLORS[i%PLAYER_COLORS.length];
    const mk=L.marker(worldToLatLng(p.x,p.y),{icon:L.divIcon({className:'',iconSize:[26,26],
      html:'<div style="width:26px;height:26px;border-radius:50%;background:'+col+';border:2px solid #fff;display:flex;align-items:center;justify-content:center;font:900 13px Nunito;color:#fff">'+esc(p.name[0])+'</div>'})})
      .addTo(GP)
      .bindPopup('👤 <b>'+esc(p.name)+'</b><br><span style="color:#8fa3c8">Niveau '+p.level+' · dernière position connue</span>')
      .bindTooltip(esc(p.name),{permanent:true,direction:'bottom',offset:[0,12],className:'baselabel'});
    MARKS['p'+i]=mk;
  });
  document.getElementById('cntB').textContent=bases.length;
  document.getElementById('cntP').textContent=players.length;
  renderSide();
  LMAP.on('click',onCalClick);
  LMAP.on('mousemove',e=>{
    const [wx,wy]=latLngToWorld(e.latlng.lat,e.latlng.lng);
    document.getElementById('coordbar').textContent =
      Math.round(wy/1000)+', '+Math.round(wx/1000)+'  (coordonnées jeu approx.)';
  });
}
function renderSide(){
  const q=(document.getElementById('mapsearch')?.value||'').toLowerCase();
  const el=document.getElementById('sideitems'); if(!el) return;
  let h='';
  (DATA.bases||[]).filter(b=>b.x!=null).forEach((b,i)=>{
    const guild=b.guild||('Base #'+(i+1));
    const hay=(guild+' '+(b.members||[]).join(' ')).toLowerCase();
    if(q&&!hay.includes(q)) return;
    const col=PLAYER_COLORS[i%PLAYER_COLORS.length];
    h+='<div class="sideitem" onclick="flyTo(\'b'+i+'\')"><span class="dot" style="background:'+col+'"></span>🏕 '+esc(guild)+'<span class="sub">'+(b.members||[]).length+' membres</span></div>';
  });
  (DATA.players||[]).filter(p=>p.x!=null).forEach((p,i)=>{
    if(q&&!p.name.toLowerCase().includes(q)) return;
    const col=PLAYER_COLORS[i%PLAYER_COLORS.length];
    h+='<div class="sideitem" onclick="flyTo(\'p'+i+'\')"><span class="dot" style="background:'+col+'"></span>👤 '+esc(p.name)+'<span class="sub">nv '+p.level+'</span></div>';
  });
  el.innerHTML=h||'<div class="sideitem" style="color:var(--mute)">Aucun résultat</div>';
}
function flyTo(id){
  const mk=MARKS[id]; if(!mk||!LMAP) return;
  LMAP.flyTo(mk.getLatLng(), 5, {duration:.6});
  setTimeout(()=>mk.openPopup(), 650);
}
function toggleLayer(){
  if(!LMAP) return;
  document.getElementById('lyBases').checked?GB.addTo(LMAP):LMAP.removeLayer(GB);
  document.getElementById('lyPlayers').checked?GP.addTo(LMAP):LMAP.removeLayer(GP);
}
function startCal(){
  const bases=(DATA.bases||[]).filter(b=>b.x!=null);
  if(bases.length<2){alert("Il faut au moins 2 bases pour calibrer.");return;}
  CAL={step:0,pts:[],bases:bases};
  calMsg("Étape 1/2 — clique sur la position RÉELLE (sur le fond de carte) de la base « "
    +(bases[0].guild||"Base #1")+" »");
}
function calMsg(t){const m=document.getElementById('calmsg');m.style.display='block';m.innerHTML=t;}
function onCalClick(e){
  if(!CAL) return;
  const px=e.latlng.lng, py=100-e.latlng.lat;
  const b=CAL.bases[CAL.step];
  CAL.pts.push({wx:b.x,wy:b.y,px:px,py:py});
  CAL.step++;
  if(CAL.step<2){
    calMsg("Étape 2/2 — clique maintenant sur la position réelle de « "
      +(CAL.bases[1].guild||"Base #2")+" »");
    return;
  }
  const [p1,p2]=CAL.pts;
  if(Math.abs(p1.wx-p2.wx)<1||Math.abs(p1.wy-p2.wy)<1||Math.abs(p1.px-p2.px)<.1||Math.abs(p1.py-p2.py)<.1){
    calMsg("⚠️ Les 2 bases sont trop alignées, réessaie avec d'autres.");
    CAL=null; return;
  }
  const a=(p2.px-p1.px)/(p2.wy-p1.wy), bo=p1.px-a*p1.wy;
  const Y_MIN=-bo/a, Y_MAX=Y_MIN+100/a;
  const c=(p2.py-p1.py)/(p2.wx-p1.wx), d=p1.py-c*p1.wx;
  const DX=-100/c, X_MAX=d*DX/100, X_MIN=X_MAX-DX;
  const cal={X_MIN:Math.round(X_MIN),X_MAX:Math.round(X_MAX),Y_MIN:Math.round(Y_MIN),Y_MAX:Math.round(Y_MAX)};
  localStorage.setItem("palcal",JSON.stringify(cal));
  CAL=null;
  calMsg("✅ Calibré sur ton navigateur ! Pour tout le monde : dans <b>export_palserver.py</b> remplace "
    +"<code style='user-select:all'>X_MIN, X_MAX = "+cal.X_MIN+", "+cal.X_MAX
    +"</code> et <code style='user-select:all'>Y_MIN, Y_MAX = "+cal.Y_MIN+", "+cal.Y_MAX+"</code> puis relance le .bat.");
  initLeaflet();
}

const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
load();
setInterval(load, 5*60*1000); // auto-refresh
</script>
